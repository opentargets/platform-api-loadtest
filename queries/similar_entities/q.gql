query SimilarEntitiesQuery(
    $id: String!
    $ids: [String!] = []
    $startYear: Int = null
    $startMonth: Int = null
    $endYear: Int = null
    $endMonth: Int = null
    $threshold: Float = 0.5
    $size: Int! = 15
    $entityNames: [String!] = []
    $cursor: String = null
) {
    target(ensemblId: $id) {
        id
        approvedName
        similarEntities(
            additionalIds: $ids
            threshold: $threshold
            size: $size
            entityNames: $entityNames
        ) {
            id
            score
            object {
                ... on Target {
                    id
                    approvedSymbol
                    __typename
                }
                ... on Drug {
                    id
                    name
                    __typename
                }
                ... on Disease {
                    id
                    name
                    __typename
                }
                __typename
            }
            __typename
        }
        literatureOcurrences(
            additionalIds: $ids
            cursor: $cursor
            startYear: $startYear
            startMonth: $startMonth
            endYear: $endYear
            endMonth: $endMonth
        ) {
            count
            filteredCount
            earliestPubYear
            cursor
            rows {
                pmid
                pmcid
                publicationDate
                __typename
            }
            __typename
        }
        __typename
    }
}
