query PhenotypesQuery($efoId: String!, $index: Int! = 0, $size: Int! = 10) {
    disease(efoId: $efoId) {
        id
        phenotypes(page: { index: $index, size: $size }) {
            count
            rows {
                phenotypeHPO {
                    id
                    name
                    description
                    namespace
                    __typename
                }
                phenotypeEFO {
                    id
                    name
                    __typename
                }
                evidence {
                    aspect
                    bioCuration
                    diseaseFromSourceId
                    diseaseFromSource
                    evidenceType
                    frequency
                    frequencyHPO {
                        name
                        id
                        __typename
                    }
                    qualifierNot
                    onset {
                        name
                        id
                        __typename
                    }
                    modifiers {
                        name
                        id
                        __typename
                    }
                    references
                    sex
                    resource
                    __typename
                }
                __typename
            }
            __typename
        }
        __typename
    }
}
