query GWASCredibleSetsQuery($variantId: String!, $size: Int!, $index: Int!) {
    variant(variantId: $variantId) {
        id
        referenceAllele
        alternateAllele
        gwasCredibleSets: credibleSets(
            studyTypes: [gwas]
            page: { size: $size, index: $index }
        ) {
            count
            rows {
                studyLocusId
                pValueMantissa
                pValueExponent
                beta
                finemappingMethod
                confidence
                variant {
                    id
                    chromosome
                    position
                    referenceAllele
                    alternateAllele
                    __typename
                }
                study {
                    traitFromSource
                    id
                    diseases {
                        name
                        id
                        therapeuticAreas {
                            name
                            id
                            __typename
                        }
                        __typename
                    }
                    __typename
                }
                locus(variantIds: [$variantId]) {
                    rows {
                        posteriorProbability
                        __typename
                    }
                    __typename
                }
                locusSize: locus {
                    count
                    __typename
                }
                l2GPredictions(page: { size: 1, index: 0 }) {
                    rows {
                        target {
                            id
                            approvedSymbol
                            __typename
                        }
                        score
                        __typename
                    }
                    __typename
                }
                __typename
            }
            __typename
        }
        __typename
    }
}
