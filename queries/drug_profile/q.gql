query DrugProfileQuery($chemblId: String!) {
    drug(chemblId: $chemblId) {
        id
        ...DrugProfileHeaderFragment
        ...DrugProfileSummaryFragment
        __typename
    }
}

fragment DrugProfileHeaderFragment on Drug {
    description
    drugType
    synonyms
    parentMolecule {
        id
        name
        __typename
    }
    childMolecules {
        id
        name
        __typename
    }
    maximumClinicalStage
    tradeNames
    __typename
}

fragment DrugProfileSummaryFragment on Drug {
    ...MechanismsOfActionSummaryFragment
    ...IndicationsSummaryFragment
    ...DrugWarningsSummaryFragment
    ...DrugPharmacogenomicsSummaryFragment
    ...AdverseEventsSummaryFragment
    ...DrugBibliography
    __typename
}

fragment MechanismsOfActionSummaryFragment on Drug {
    mechanismsOfAction {
        uniqueActionTypes
        uniqueTargetTypes
        __typename
    }
    parentMolecule {
        id
        name
        __typename
    }
    childMolecules {
        id
        name
        __typename
    }
    __typename
}

fragment IndicationsSummaryFragment on Drug {
    indications {
        count
        __typename
    }
    __typename
}

fragment DrugWarningsSummaryFragment on Drug {
    drugWarnings {
        warningType
        __typename
    }
    __typename
}

fragment DrugPharmacogenomicsSummaryFragment on Drug {
    pharmacogenomics {
        targetFromSourceId
        __typename
    }
    __typename
}

fragment AdverseEventsSummaryFragment on Drug {
    adverseEvents {
        count
        __typename
    }
    __typename
}

fragment DrugBibliography on Drug {
    literatureOcurrences {
        count
        filteredCount
        __typename
    }
    __typename
}
