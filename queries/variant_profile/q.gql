query VariantProfileQuery($variantId: String!) {
    variant(variantId: $variantId) {
        id
        ...VariantProfileHeaderFragment
        ...VariantProfileSummaryFragment
        __typename
    }
}

fragment VariantProfileHeaderFragment on Variant {
    chromosome
    position
    referenceAllele
    alternateAllele
    variantDescription
    alleleFrequencies {
        populationName
        alleleFrequency
        __typename
    }
    mostSevereConsequence {
        id
        label
        __typename
    }
    __typename
}

fragment VariantProfileSummaryFragment on Variant {
    ...VariantEffectSummaryFragment
    ...MolecularStructureSummaryFragment
    ...VariantEffectPredictorSummaryFragment
    ...EVASummaryFragment
    ...UniProtVariantsSummaryFragment
    ...VariantGWASCredibleSetsSummaryFragment
    ...VariantQTLCredibleSetsSummaryFragment
    ...EnhancerToGenePredictionsSummaryFragment
    ...VariantPharmacogenomicsSummaryFragment
    __typename
}

fragment VariantEffectSummaryFragment on Variant {
    variantEffect {
        method
        __typename
    }
    __typename
}

fragment MolecularStructureSummaryFragment on Variant {
    id
    proteinCodingCoordinates {
        count
        rows {
            referenceAminoAcid
            __typename
        }
        __typename
    }
    __typename
}

fragment VariantEffectPredictorSummaryFragment on Variant {
    transcriptConsequences {
        isEnsemblCanonical
        __typename
    }
    __typename
}

fragment EVASummaryFragment on Variant {
    evaEvidences: evidences(datasourceIds: ["eva"]) {
        count
        __typename
    }
    __typename
}

fragment UniProtVariantsSummaryFragment on Variant {
    uniProtEvidences: evidences(datasourceIds: ["uniprot_variants"]) {
        count
        __typename
    }
    __typename
}

fragment VariantGWASCredibleSetsSummaryFragment on Variant {
    gwasCredibleSets: credibleSets(
        studyTypes: [gwas]
        page: { size: 1, index: 0 }
    ) {
        count
        __typename
    }
    __typename
}

fragment VariantQTLCredibleSetsSummaryFragment on Variant {
    qtlCredibleSets: credibleSets(
        studyTypes: [scsqtl, sceqtl, scpqtl, sctuqtl, sqtl, eqtl, pqtl, tuqtl]
        page: { size: 1, index: 0 }
    ) {
        count
        __typename
    }
    __typename
}

fragment EnhancerToGenePredictionsSummaryFragment on Variant {
    intervals {
        count
        __typename
    }
    __typename
}

fragment VariantPharmacogenomicsSummaryFragment on Variant {
    pharmacogenomics {
        isDirectTarget
        __typename
    }
    __typename
}
